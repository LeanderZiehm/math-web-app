<div class="container">
    <div class="stats">
        Streak: {{ streak }} <br />
        Total: {{ total }}
    </div>

    <div class="question">
        {{ current.question }}
    </div>

    <div class="result" *ngIf="submitted" [ngClass]="{
    correct: answerInput === current.answer,
    wrong: answerInput !== current.answer
  }">
        <span *ngIf="answerInput === current.answer">Correct!</span>
        <span *ngIf="answerInput !== current.answer">
            Wrong! Correct: {{ current.answer }}
        </span>
    </div>

    <input type="number" [(ngModel)]="answerInput" placeholder="Your answer" />

    <button *ngIf="!submitted" (click)="checkAnswer()" [disabled]="answerInput === null">
        Submit
    </button>

    <button *ngIf="submitted" (click)="nextQuestion()">
        Continue
    </button>
</div>

<router-outlet />
